<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هل تقبلين الزواج مني؟ 💍</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 100%);
min-height:100vh;
overflow:hidden;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
text-align:center;
}

#cat{
width:200px;
margin-bottom:20px;
}

.step{display:none;}
.step.active{display:block;}

button{
padding:12px 30px;
border:none;
border-radius:40px;
cursor:pointer;
font-size:18px;
margin:10px;
}

.btn-next{background:#ff758c;color:white;}
.btn-yes{background:#ff4d6d;color:white;}
.btn-no{background:#6c757d;color:white;position:relative;}
</style>
</head>

<body>

<div class="container">

<div id="cat">
<svg viewBox="0 0 100 100">
<ellipse cx="50" cy="60" rx="35" ry="30" fill="#ffa500"/>
<polygon points="20,40 30,15 40,35" fill="#ffa500"/>
<polygon points="80,40 70,15 60,35" fill="#ffa500"/>
<ellipse cx="35" cy="50" rx="8" ry="10" fill="#333"/>
<ellipse cx="65" cy="50" rx="8" ry="10" fill="#333"/>
<polygon points="50,58 45,65 55,65" fill="#ff69b4"/>
<path d="M 40 70 Q 50 80 60 70" stroke="#333" stroke-width="2" fill="none"/>
</svg>
</div>

<div class="step active" id="step1">
<h1>مرحباً حبيبتي 👋</h1>
<p>لدي شيء مهم أريد أن أخبرك به...</p>
<button class="btn-next" onclick="nextStep(2)">هيا بنا 💕</button>
</div>

<div class="step" id="step2">
<h1>أريد أن أخبرك بشيء 💭</h1>
<p>منذ أن دخلتِ حياتي أصبح كل شيء أجمل...</p>
<button class="btn-next" onclick="nextStep(3)">استمر 🌸</button>
</div>

<div class="step" id="step3">
<h1>هل تقبلين الزواج مني؟ 💍</h1>
<p>أريد أن أقضي بقية حياتي معك ❤️</p>
<button class="btn-yes" onclick="acceptLove()">نعم ❤️</button>
<button class="btn-no" id="noBtn">لا 😢</button>
</div>

<div class="step" id="step4">
<h1>قالت نعم! 🎉</h1>
<p>أحبك إلى الأبد 💖</p>
</div>

</div>

<script>
function nextStep(id){
document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
document.getElementById('step'+id).classList.add('active');
}

function acceptLove(){
nextStep(4);
}

const noBtn=document.getElementById("noBtn");
if(noBtn){
noBtn.addEventListener("mouseover",()=>{
noBtn.style.position="fixed";
noBtn.style.left=Math.random()*80+"vw";
noBtn.style.top=Math.random()*80+"vh";
});
}
</script>

</body>
</html>
