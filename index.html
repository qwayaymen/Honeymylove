<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Huny 💙</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #000;
    color: white;
    transition: 0.6s;
}

.page {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.active {
    display: flex;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
}

.blue {
    background-color: #1e90ff;
    color: white;
}

.pink {
    background-color: hotpink;
    color: white;
}

.butterfly {
    position: absolute;
    font-size: 30px;
    animation: float 10s linear infinite;
    color: #1e90ff;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- الصفحة 1 -->
<div id="page1" class="page active">
    <h1>Huny 💙</h1>
    <p>اشتقت اليك اليوم كثيرا 💙<br>هل انتي ايضا اشتقتي الي ؟!</p>
    <button class="blue" onclick="nextPage(2)">نعم</button>
</div>

<!-- الصفحة 2 -->
<div id="page2" class="page">
    <h1 onclick="nextPage(3)" style="cursor:pointer;">
        You are special 🦋💙
    </h1>
</div>

<!-- الصفحة 3 -->
<div id="page3" class="page">
    <button class="pink" onclick="finalPage()">
        اريد حظنا كبيراااااا 🫂🫂
    </button>
</div>

<script>
function nextPage(pageNumber) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page" + pageNumber).classList.add("active");
}

function finalPage() {
    document.body.style.backgroundColor = "#ffc0cb";
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

    for (let i = 0; i < 30; i++) {
        let butterfly = document.createElement("div");
        butterfly.className = "butterfly";
        butterfly.innerHTML = "🦋";
        butterfly.style.left = Math.random() * 100 + "vw";
        butterfly.style.animationDuration = (5 + Math.random() * 5) + "s";
        document.body.appendChild(butterfly);
    }
}
</script>

</body>
</html>
