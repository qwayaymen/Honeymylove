<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huny 💙</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-blue: #4facfe;
    --secondary-blue: #00f2fe;
    --accent-pink: #ff6b9d;
    --soft-white: rgba(255, 255, 255, 0.95);
    --glass-bg: rgba(255, 255, 255, 0.25);
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Floating Particles Background */
.particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
}

.particle {
    position: absolute;
    bottom: -100px;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0.6;
}

@keyframes floatUp {
    to {
        transform: translateY(-120vh) rotate(360deg);
        opacity: 0;
    }
}

/* Glassmorphism Card */
.card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 50px 40px;
    border-radius: 30px;
    box-shadow: 
        0 25px 50px rgba(0,0,0,0.15),
        inset 0 0 0 1px rgba(255,255,255,0.2);
    text-align: center;
    width: 90%;
    max-width: 450px;
    position: relative;
    z-index: 10;
    animation: cardEntry 1.2s cubic-bezier(0.23, 1, 0.32, 1);
    transform-style: preserve-3d;
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-5px) rotateX(2deg);
}

@keyframes cardEntry {
    0% {
        opacity: 0;
        transform: translateY(60px) scale(0.9);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* Typography */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3.5rem;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 25px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    animation: titlePulse 3s ease-in-out infinite;
}

@keyframes titlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
}

p {
    font-size: 1.3rem;
    color: #2c3e50;
    line-height: 1.8;
    margin-bottom: 30px;
    font-weight: 400;
    text-shadow: 0 1px 2px rgba(255,255,255,0.5);
}

/* Enhanced Buttons */
button {
    margin-top: 20px;
    padding: 16px 45px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-size: 1.2rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 
        0 10px 30px rgba(102, 126, 234, 0.4),
        0 0 0 0 rgba(102, 126, 234, 0.7);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4), 0 0 0 0 rgba(102, 126, 234, 0.7); }
    70% { box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4), 0 0 0 20px rgba(102, 126, 234, 0); }
    100% { box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4), 0 0 0 0 rgba(102, 126, 234, 0); }
}

button:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 20px 40px rgba(102, 126, 234, 0.6);
}

button:active {
    transform: translateY(-1px) scale(0.98);
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
}

button:hover::before {
    left: 100%;
}

/* Page Management */
.page {
    display: none;
    animation: fadeIn 0.8s ease;
}

.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Special Text Effects */
.special-text {
    font-size: 2rem;
    color: #764ba2;
    font-weight: 700;
    cursor: pointer;
    display: inline-block;
    position: relative;
    transition: all 0.3s ease;
    text-shadow: 0 2px 10px rgba(118, 75, 162, 0.3);
}

.special-text:hover {
    transform: scale(1.1);
    color: #ff6b9d;
}

.special-text::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff6b9d, #764ba2);
    transition: width 0.3s ease;
    border-radius: 2px;
}

.special-text:hover::after {
    width: 100%;
}

/* Butterfly Animation */
.butterfly {
    position: fixed;
    font-size: 2rem;
    z-index: 5;
    pointer-events: none;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
}

.butterfly {
    animation: butterflyFloat 15s linear infinite;
}

@keyframes butterflyFloat {
    0% {
        transform: translateY(110vh) translateX(0) rotate(0deg);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    90% {
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) translateX(100px) rotate(360deg);
        opacity: 0;
    }
}

/* Heart Burst Effect */
.heart-burst {
    position: absolute;
    pointer-events: none;
    animation: burst 1s ease-out forwards;
}

@keyframes burst {
    0% {
        transform: scale(0);
        opacity: 1;
    }
    100% {
        transform: scale(3);
        opacity: 0;
    }
}

/* Final Page Styles */
.final-message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 4rem;
    color: white;
    font-family: 'Great Vibes', cursive;
    text-align: center;
    z-index: 100;
    display: none;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    animation: finalFadeIn 2s ease;
}

@keyframes finalFadeIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* Audio Control */
.audio-control {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    font-size: 1.5rem;
}

.audio-control:hover {
    transform: scale(1.1);
    background: white;
}

/* Responsive Design */
@media (max-width: 600px) {
    h1 { font-size: 2.5rem; }
    p { font-size: 1.1rem; }
    .card { padding: 30px 25px; }
    button { padding: 14px 35px; font-size: 1.1rem; }
}
</style>
</head>

<body>

<!-- Floating Particles -->
<div class="particles" id="particles"></div>

<!-- Audio with Control -->
<audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<div class="audio-control" onclick="toggleMusic()" id="audioBtn">
    🎵
</div>

<!-- Page 1: Welcome -->
<div class="card page active" id="page1">
    <h1>Huny 💙</h1>
    <p>
        اشتقت إليكِ اليوم كثيراً 💙<br>
        هل اشتقتِ إليَّ أيضاً؟
    </p>
    <button onclick="nextPage(2)">
        نعم، اشتقتُ إليك 🦋
    </button>
</div>

<!-- Page 2: Special Message -->
<div class="card page" id="page2">
    <h1>You are Special</h1>
    <p>
        في كل نبضة قلب<br>
        وفي كل لحظة صمت<br>
        أنتِ هناكِ... 💙
    </p>
    <div class="special-text" onclick="nextPage(3)">
        اضغطي هنا يا جميلتي 🦋
    </div>
</div>

<!-- Page 3: Final Wish -->
<div class="card page" id="page3">
    <h1>حُبّنا</h1>
    <p>
        أريدُ حظّنا أن يكون<br>
        أكبرَ من السماء 💙<br>
        وأوسعَ من البحار
    </p>
    <button onclick="finalPage()">
        اضغطي لنبدأ حكايتنا 🫂✨
    </button>
</div>

<!-- Final Message -->
<div class="final-message" id="finalMsg">
    أحبكِ إلى ما لا نهاية 💙<br>
    <span style="font-size: 2rem;">🦋 Huny 🦋</span>
</div>

<script>
// Initialize particles
function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.width = Math.random() * 10 + 5 + 'px';
        particle.style.height = particle.style.width;
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        particle.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(particle);
    }
}
createParticles();

// Audio Control
let isPlaying = false;
const music = document.getElementById('bgMusic');
const audioBtn = document.getElementById('audioBtn');

function toggleMusic() {
    if (isPlaying) {
        music.pause();
        audioBtn.innerHTML = '🔇';
    } else {
        music.play();
        audioBtn.innerHTML = '🎵';
    }
    isPlaying = !isPlaying;
}

// Auto-play on first interaction
document.addEventListener('click', function initAudio() {
    if (!isPlaying) {
        music.play().then(() => {
            isPlaying = true;
        }).catch(e => console.log('Audio autoplay blocked'));
    }
    document.removeEventListener('click', initAudio);
}, { once: true });

// Navigation
function nextPage(num) {
    // Add transition effect
    document.querySelectorAll('.page').forEach(p => {
        p.style.animation = 'fadeOut 0.5s ease';
        setTimeout(() => p.classList.remove('active'), 400);
    });
    
    setTimeout(() => {
        document.getElementById('page' + num).classList.add('active');
        createHeartBurst(event);
    }, 500);
}

// Heart burst effect
function createHeartBurst(e) {
    if (!e) return;
    const x = e.clientX || window.innerWidth / 2;
    const y = e.clientY || window.innerHeight / 2;
    
    for (let i = 0; i < 8; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-burst';
        heart.innerHTML = '💙';
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        heart.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }
}

// Final Page Animation
function finalPage() {
    // Hide all cards
    document.querySelectorAll('.card').forEach(c => {
        c.style.transition = 'all 1s ease';
        c.style.opacity = '0';
        c.style.transform = 'scale(0.8)';
        setTimeout(() => c.style.display = 'none', 1000);
    });
    
    // Change background
    document.body.style.transition = 'background 2s ease';
    document.body.style.background = 'linear-gradient(135deg, #ff6b9d 0%, #f093fb 50%, #f5576c 100%)';
    
    // Show final message
    setTimeout(() => {
        document.getElementById('finalMsg').style.display = 'block';
        
        // Create butterfly storm
        for (let i = 0; i < 60; i++) {
            setTimeout(() => {
                const b = document.createElement('div');
                b.className = 'butterfly';
                b.innerHTML = ['🦋', '💙', '✨', '🌸'][Math.floor(Math.random() * 4)];
                b.style.left = Math.random() * 100 + 'vw';
                b.style.animationDuration = (8 + Math.random() * 10) + 's';
                b.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
                document.body.appendChild(b);
            }, i * 100);
        }
    }, 1000);
}

// Add fadeOut animation dynamically
const style = document.createElement('style');
style.textContent = `
    @keyframes fadeOut {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-20px); }
    }
`;
document.head.appendChild(style);

// Mouse parallax effect
document.addEventListener('mousemove', (e) => {
    const cards = document.querySelectorAll('.card');
    const x = (window.innerWidth - e.pageX) / 50;
    const y = (window.innerHeight - e.pageY) / 50;
    
    cards.forEach(card => {
        if (card.classList.contains('active')) {
            card.style.transform = `translateX(${x}px) translateY(${y}px)`;
        }
    });
});
</script>

</body>
</html>
