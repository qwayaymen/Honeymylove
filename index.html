<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>صور خاصة</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
    }
    h1 {
      color: #ff69b4;
      margin-bottom: 40px;
      font-size: 2.4rem;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.7);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: scale(1.06);
      box-shadow: 0 12px 30px rgba(255,105,180,0.4);
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
    }
    footer {
      margin-top: 60px;
      color: #888;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>اضغط على الصورة اللي تعجبك 💜</h1>

  <div class="gallery">

    <!-- الصورة 1 -->
    <div class="card" onclick="alert('تعال إلي 🫦')">
      <img src="https://files.catbox.moe/ngoyb1.jpg" alt="صورة 1">
    </div>

    <!-- الصورة 2 -->
    <div class="card" onclick="alert('أحبككك 💕')">
      <img src="https://files.catbox.moe/k4quu3.jpg" alt="صورة 2">
    </div>

    <!-- الصورة 3 -->
    <div class="card" onclick="alert('اليوم يوم ساخن جدًا 🔥😈')">
      <img src="https://files.catbox.moe/dk7ght.jpg" alt="صورة 3">
    </div>

  </div>

  <footer>
    تم إنشاؤه بسرعة لك • 2025
  </footer>

</body>
</html>
