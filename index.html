<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huny 💙</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #cce7ff, #e6f2ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    transition: 0.8s;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    text-align: center;
    width: 85%;
    max-width: 400px;
    animation: fadeIn 1s ease;
}

h1 {
    color: #1e90ff;
    margin-bottom: 15px;
}

p {
    font-size: 18px;
    color: #333;
}

button {
    margin-top: 25px;
    padding: 14px 28px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #1e90ff, #66b3ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.page {
    display: none;
}

.active {
    display: block;
}

.butterfly {
    position: absolute;
    font-size: 28px;
    animation: float 12s linear infinite;
    color: #1e90ff;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<div class="card page active" id="page1">
    <h1>Huny 💙</h1>
    <p>
        اشتقت اليك اليوم كثيرا 💙<br>
        هل انتي ايضا اشتقتي الي ؟!
    </p>
    <button onclick="nextPage(2)">نعم</button>
</div>

<div class="card page" id="page2">
    <h1 onclick="nextPage(3)" style="cursor:pointer;">
        You are special 🦋💙
    </h1>
</div>

<div class="card page" id="page3">
    <button onclick="finalPage()">
        اريد حظنا كبيراااااا 🫂🫂
    </button>
</div>

<script>
function nextPage(num) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page" + num).classList.add("active");
}

function finalPage() {
    document.body.style.background = "#ffd6ec";
    document.querySelectorAll(".card").forEach(c => c.style.display = "none");

    for (let i = 0; i < 40; i++) {
        let b = document.createElement("div");
        b.className = "butterfly";
        b.innerHTML = "🦋";
        b.style.left = Math.random() * 100 + "vw";
        b.style.animationDuration = (6 + Math.random() * 6) + "s";
        document.body.appendChild(b);
    }
}
</script>

</body>
</html>
